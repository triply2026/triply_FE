<!-- AI Travel Loading Icon (Large Version) -->
<svg
        width="220"
        height="220"
        viewBox="0 0 128 128"
        xmlns="http://www.w3.org/2000/svg"
        role="img"
        aria-label="AI loading icon"
>

    <defs>

        <!-- Main gradient -->
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F7FAFF"/>
            <stop offset="50%" stop-color="#C7D6FF"/>
            <stop offset="100%" stop-color="#8EA8FF"/>
        </linearGradient>

        <!-- Glow gradient -->
        <radialGradient id="g2" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#DCE6FF" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#DCE6FF" stop-opacity="0"/>
        </radialGradient>

        <!-- Soft glow -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="10" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

    </defs>

    <!-- Background glow -->
    <g filter="url(#glow)">
        <circle cx="64" cy="64" r="36" fill="url(#g2)" />
    </g>

    <!-- Rotating petals -->
    <g transform="translate(64,64)">

        <!-- Petal A -->
        <g transform="rotate(0)">
            <path d="M0 -44 C18 -44, 34 -30, 34 -10 C34 12, 18 26, 0 26 C-18 26, -34 12, -34 -10 C-34 -30, -18 -44, 0 -44 Z"
                  fill="url(#g1)"
                  opacity="0.92">

                <animateTransform
                        attributeName="transform"
                        type="rotate"
                        from="0"
                        to="360"
                        dur="8s"
                        repeatCount="indefinite"/>

                <animate
                        attributeName="opacity"
                        values="0.92;0.6;0.92"
                        dur="4s"
                        repeatCount="indefinite"/>
            </path>
        </g>

        <!-- Petal B -->
        <g transform="rotate(120)">
            <path d="M0 -34 C14 -34, 28 -24, 28 -8 C28 10, 14 20, 0 20 C-14 20, -28 10, -28 -8 C-28 -24, -14 -34, 0 -34 Z"
                  fill="#AFC2FF"
                  opacity="0.88">

                <animateTransform
                        attributeName="transform"
                        type="rotate"
                        from="120"
                        to="-240"
                        dur="12s"
                        repeatCount="indefinite"/>

                <animate
                        attributeName="opacity"
                        values="0.85;0.45;0.85"
                        dur="5.5s"
                        repeatCount="indefinite"/>
            </path>
        </g>

        <!-- Petal C -->
        <g transform="rotate(240)">
            <path d="M0 -30 C12 -30, 24 -20, 24 -6 C24 8, 12 18, 0 18 C-12 18, -24 8, -24 -6 C-24 -20, -12 -30, 0 -30 Z"
                  fill="#7B96FF"
                  opacity="0.92">

                <animateTransform
                        attributeName="transform"
                        type="rotate"
                        from="240"
                        to="600"
                        dur="10s"
                        repeatCount="indefinite"/>

                <animateTransform
                        attributeName="transform"
                        additive="sum"
                        type="scale"
                        from="0.96"
                        to="1.06"
                        dur="2.4s"
                        repeatCount="indefinite"/>
            </path>
        </g>

        <!-- Center Core -->
        <circle cx="0" cy="0" r="10" fill="#FFFFFF" opacity="0.98">

            <animate
                    attributeName="r"
                    values="10;12;10"
                    dur="1.8s"
                    repeatCount="indefinite"/>

            <animate
                    attributeName="opacity"
                    values="0.98;0.7;0.98"
                    dur="1.8s"
                    repeatCount="indefinite"/>
        </circle>

        <!-- Sparkles -->
        <g>

            <circle cx="-28" cy="-6" r="2.2"
                    fill="#EEF3FF"
                    opacity="0.9">

                <animate
                        attributeName="cy"
                        values="-6;-10;-6"
                        dur="2.6s"
                        repeatCount="indefinite"/>

                <animate
                        attributeName="opacity"
                        values="0.9;0.25;0.9"
                        dur="2.6s"
                        repeatCount="indefinite"/>
            </circle>

            <circle cx="26" cy="8" r="1.6"
                    fill="#DCE6FF"
                    opacity="0.85">

                <animate
                        attributeName="cx"
                        values="26;30;26"
                        dur="2.1s"
                        repeatCount="indefinite"/>

                <animate
                        attributeName="opacity"
                        values="0.85;0.2;0.85"
                        dur="2.1s"
                        repeatCount="indefinite"/>
            </circle>

        </g>

    </g>

</svg>